name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Python lint
        run: |
          python -m pip install ruff
          ruff check scripts tests
      - name: Thin overlay smoke test
        run: |
          python scripts/mpmg.py integration-map examples/agent-chaos-before-after/before --format markdown
          python scripts/mpmg.py integration-map examples/agent-chaos-before-after/after --format json
      - name: Installed package smoke test
        run: |
          python -m pip install .
          cd "$RUNNER_TEMP"
          mpmg integration-map "$GITHUB_WORKSPACE/examples/agent-chaos-before-after/before" --format json
          mpmg init --target "$RUNNER_TEMP/mpmg-installed-project" --project-name InstalledSmoke --notes-namespace notes/Projects/InstalledSmoke
          mpmg validate "$RUNNER_TEMP/mpmg-installed-project"
          mpmg worker-task --target "$RUNNER_TEMP/mpmg-installed-project" --name smoke --task "Verify packaged templates." --scope handoff/
          mpmg export-public --output "$RUNNER_TEMP/mpmg-installed-export" --force
          test ! -d "$RUNNER_TEMP/mpmg-installed-export/scripts/_kit"
      - name: Validate example project
        run: python scripts/validate_governance.py examples/minimal-project
      - name: Governance audit
        run: python scripts/governance_audit.py examples/minimal-project --format markdown
      - name: Doctor smoke test
        run: python scripts/mpmg.py doctor examples/minimal-project
      - name: Before/after demo smoke test
        run: |
          ! python scripts/mpmg.py doctor examples/agent-chaos-before-after/before
          python scripts/mpmg.py doctor examples/agent-chaos-before-after/after
          python scripts/mpmg.py validate-artifacts examples/agent-chaos-before-after/after
      - name: Handoff cleanup planner smoke test
        run: python scripts/mpmg.py plan-handoff-cleanup examples/multi-agent-review --format markdown
      - name: Artifact metadata validation
        run: python scripts/mpmg.py validate-artifacts examples/multi-agent-review
      - name: Public export smoke test
        run: python scripts/export_public_subset.py --output /tmp/mpmg-export --force
      - name: Public safety scan
        run: python scripts/check_public_safety.py .
