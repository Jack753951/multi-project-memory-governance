name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Validate example project
        run: python scripts/validate_governance.py examples/minimal-project
      - name: Public safety scan
        run: python scripts/check_public_safety.py .
